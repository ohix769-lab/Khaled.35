<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>شجرة العائلة</title>

<style>
body{margin:0;background:#0f172a;color:#fff;font-family:tahoma}
header{padding:10px;background:#1e293b;display:flex;gap:10px}
button{padding:6px 10px;border:none;border-radius:6px;background:#38bdf8;cursor:pointer}

#tree{position:relative;height:90vh}
.node{
  position:absolute;background:#1e293b;border:1px solid #38bdf8;
  padding:6px;border-radius:8px;text-align:center;width:100px
}

svg{position:absolute;top:0;left:0;width:100%;height:100%}
line{stroke:#38bdf8;stroke-width:2}
</style>
</head>

<body>

<header>
<button onclick="addRoot()">➕ إضافة أصل</button>
<button onclick="save()">💾 حفظ</button>
</header>

<div id="tree">
<svg id="lines"></svg>
</div>

<script>
let people = JSON.parse(localStorage.getItem("family")||"[]");

function addRoot(){
  let name=prompt("اسم الشخص");
  if(!name)return;
  people.push({id:Date.now(),name,children:[]});
  render();
}

function addChild(parentId){
  let name=prompt("اسم الابن");
  if(!name)return;
  let child={id:Date.now(),name,children:[]};
  let parent=people.find(p=>p.id===parentId);
  parent.children.push(child);
  people.push(child);
  render();
}

function render(){
  const tree=document.getElementById("tree");
  const svg=document.getElementById("lines");
  tree.querySelectorAll(".node").forEach(n=>n.remove());
  svg.innerHTML="";

  let levelMap={};

  function walk(person,level=0){
    if(!levelMap[level])levelMap[level]=[];
    levelMap[level].push(person);

    person.children.forEach(c=>walk(c,level+1));
  }

  let roots=people.filter(p=>!people.some(x=>x.children?.includes(p)));
  roots.forEach(r=>walk(r));

  Object.keys(levelMap).forEach(level=>{
    levelMap[level].forEach((p,i)=>{
      let div=document.createElement("div");
      div.className="node";
      div.style.top=(level*120+50)+"px";
      div.style.left=(i*140+50)+"px";

      div.innerHTML=`
        ${p.name}<br>
        <button onclick="addChild(${p.id})">➕ ابن</button>
      `;
      tree.appendChild(div);
      p._pos={x:i*140+100,y:level*120+80};
    });
  });

  // رسم الخطوط
  people.forEach(p=>{
    p.children.forEach(c=>{
      let line=document.createElementNS("http://www.w3.org/2000/svg","line");
      line.setAttribute("x1",p._pos.x);
      line.setAttribute("y1",p._pos.y);
      line.setAttribute("x2",c._pos.x);
      line.setAttribute("y2",c._pos.y);
      svg.appendChild(line);
    });
  });
}

function save(){
  localStorage.setItem("family",JSON.stringify(people));
  alert("تم الحفظ");
}

render();
</script>

</body>
</html>
